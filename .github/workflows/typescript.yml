on:
  push:
    paths:
      - 'libs/gl-sdk-napi/package.json'
    branches:
      - main
  pull_request: {}
  release:
    types: [created]
  workflow_dispatch:

name: Typescript Library

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
    defaults:
      run:
        working-directory: libs/gl-sdk-napi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - id: check
        run: |
          CURRENT_VERSION=$(cat package.json | jq -r '.version')
          git checkout HEAD^
          PREVIOUS_VERSION=$(cat package.json | jq -r '.version')
          git checkout -
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: |
              npm run build --target x86_64-unknown-linux-gnu
              strip -x *.node
          
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: |
              npm run build --target aarch64-unknown-linux-gnu
          
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: |
              npm run build --target x86_64-unknown-linux-musl
              strip -x *.node
          
          - host: macos-13
            target: x86_64-apple-darwin
            build: |
              npm run build --target x86_64-apple-darwin
              strip -x *.node
          
          - host: macos-14
            target: aarch64-apple-darwin
            build: |
              npm run build --target aarch64-apple-darwin
              strip -x *.node
          
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build --target x86_64-pc-windows-msvc
          
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: npm run build --target aarch64-pc-windows-msvc

    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    
    defaults:
      run:
        working-directory: libs/gl-sdk-napi
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: libs/gl-sdk-napi/package-lock.json
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      
      - name: Setup cross-compilation (Linux ARM64)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      
      - name: Setup musl tools (Linux musl)
        if: matrix.settings.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/cache
          key: ${{ matrix.settings.target }}-cargo-registry
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index
          key: ${{ matrix.settings.target }}-cargo-index
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: libs/gl-sdk-napi/*.node
          if-no-files-found: error

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build
    
    defaults:
      run:
        working-directory: libs/gl-sdk-napi
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Move artifacts to package directory
        run: |
          for dir in ../../artifacts/bindings-*; do
            if [ -d "$dir" ]; then
              echo "Processing $dir"
              cp "$dir"/*.node . 2>/dev/null || true
            fi
          done
          ls -la *.node
      
      - name: List package contents
        run: npm pack --dry-run
      
      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
