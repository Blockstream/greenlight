# ==============================================================================
# RELEASE ORCHESTRATOR
# ==============================================================================
# Unified release workflow for gl-client, gl-sdk, and all derived bindings.
#
# Publishes Rust crates in topological dependency order (with crates.io
# index polling between each step), builds all binding artifacts in
# parallel via reusable workflows, and pushes to npm, PyPI, Swift SPM,
# and creates GitHub Releases.
#
# Dry-run mode runs `cargo publish --dry-run`, `npm publish --dry-run`,
# and builds all bindings, but does not push tags, create releases, or
# upload to any registry.
#
# Usage:
#   1. Merge the release PR into main (version bumps + changelogs).
#   2. Go to Actions > Release Orchestrator > Run workflow.
#   3. Fill in version numbers; set dry_run=true for validation only.
#
# See RELEASE.md for the full process documentation.
# ==============================================================================

name: Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      gl_client_version:
        description: 'gl-client version (e.g. 0.6.0)'
        required: true
        type: string
      gl_sdk_version:
        description: 'gl-sdk version (e.g. 0.4.0)'
        required: true
        type: string
      gl_sdk_cli_version:
        description: 'gl-sdk-cli version (e.g. 0.3.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run: validate and build, skip real publishing'
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

# ==============================================================================
# STAGE 1: VALIDATE
# ==============================================================================
jobs:
  validate:
    name: Validate release configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.2'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Cargo.toml versions match inputs
        run: |
          check_version() {
            local crate=$1 expected=$2
            local actual
            actual=$(cargo metadata --no-deps --format-version 1 \
              | jq -r ".packages[] | select(.name == \"$crate\") | .version")
            if [ "$actual" != "$expected" ]; then
              echo "::error::$crate version mismatch: Cargo.toml=$actual, input=$expected"
              exit 1
            fi
            echo "  $crate: $actual ✓"
          }
          echo "Checking versions..."
          check_version gl-client "${{ inputs.gl_client_version }}"
          check_version gl-sdk    "${{ inputs.gl_sdk_version }}"
          check_version gl-sdk-cli "${{ inputs.gl_sdk_cli_version }}"

      - name: Setup Python for changelog validation
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Validate changelogs
        run: |
          pip install python-kacl
          for crate_dir in libs/gl-client libs/gl-sdk libs/gl-sdk-cli; do
            echo "Validating $crate_dir/CHANGELOG.md..."
            (cd "$crate_dir" && kacl-cli verify)
          done

      - name: Verify changelog entries exist for each version
        run: |
          check_entry() {
            local file=$1 version=$2
            if ! grep -qE "^## \[?v?$version\]?" "$file"; then
              echo "::error::No changelog entry for $version in $file"
              exit 1
            fi
            echo "  $file: [$version] ✓"
          }
          echo "Checking changelog entries..."
          check_entry libs/gl-client/CHANGELOG.md  "${{ inputs.gl_client_version }}"
          check_entry libs/gl-sdk/CHANGELOG.md     "${{ inputs.gl_sdk_version }}"
          check_entry libs/gl-sdk-cli/CHANGELOG.md "${{ inputs.gl_sdk_cli_version }}"

      - name: Cargo check (workspace compiles)
        run: cargo check

  # ============================================================================
  # STAGE 2: PUBLISH RUST CRATES (sequential, topological order)
  # ============================================================================
  # In dry-run mode these jobs run `cargo publish --dry-run` which
  # packages, verifies, and compiles the crate but does not upload.
  # In real mode they use trusted publishing (OIDC) to upload.
  # ============================================================================
  publish-gl-client:
    name: Publish gl-client
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.2'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish gl-client
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN: cargo publish --dry-run ==="
            cargo publish -p gl-client --dry-run
          else
            if cargo info "gl-client@${{ inputs.gl_client_version }}" --registry crates-io &>/dev/null; then
              echo "gl-client ${{ inputs.gl_client_version }} already published -- skipping"
            else
              cargo publish -p gl-client
            fi
          fi

  publish-gl-sdk:
    name: Publish gl-sdk
    needs: publish-gl-client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.2'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for gl-client on crates.io index
        if: ${{ inputs.dry_run == false }}
        run: |
          for i in $(seq 1 30); do
            if cargo info "gl-client@${{ inputs.gl_client_version }}" --registry crates-io &>/dev/null; then
              echo "gl-client ${{ inputs.gl_client_version }} available on crates.io"
              exit 0
            fi
            echo "Waiting for crates.io index... (attempt $i/30)"
            sleep 20
          done
          echo "::error::Timed out waiting for gl-client on crates.io"
          exit 1

      - name: Publish gl-sdk
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN: cargo publish --dry-run ==="
            cargo publish -p gl-sdk --dry-run
          else
            if cargo info "gl-sdk@${{ inputs.gl_sdk_version }}" --registry crates-io &>/dev/null; then
              echo "gl-sdk ${{ inputs.gl_sdk_version }} already published -- skipping"
            else
              cargo publish -p gl-sdk
            fi
          fi

  publish-gl-sdk-cli:
    name: Publish gl-sdk-cli
    needs: publish-gl-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.2'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for gl-sdk on crates.io index
        if: ${{ inputs.dry_run == false }}
        run: |
          for i in $(seq 1 30); do
            if cargo info "gl-sdk@${{ inputs.gl_sdk_version }}" --registry crates-io &>/dev/null; then
              echo "gl-sdk ${{ inputs.gl_sdk_version }} available on crates.io"
              exit 0
            fi
            echo "Waiting for crates.io index... (attempt $i/30)"
            sleep 20
          done
          echo "::error::Timed out waiting for gl-sdk on crates.io"
          exit 1

      - name: Publish gl-sdk-cli
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN: cargo publish --dry-run ==="
            cargo publish -p gl-sdk-cli --dry-run
          else
            if cargo info "gl-sdk-cli@${{ inputs.gl_sdk_cli_version }}" --registry crates-io &>/dev/null; then
              echo "gl-sdk-cli ${{ inputs.gl_sdk_cli_version }} already published -- skipping"
            else
              cargo publish -p gl-sdk-cli
            fi
          fi

  # ============================================================================
  # STAGE 3: BUILD BINDINGS (parallel, via reusable workflows)
  # ============================================================================
  build-swift:
    name: Build Swift
    needs: validate
    uses: ./.github/workflows/build-swift.yml
    with:
      ref: ${{ github.sha }}

  build-kotlin:
    name: Build Kotlin
    needs: validate
    uses: ./.github/workflows/build-kotlin.yml
    with:
      ref: ${{ github.sha }}

  build-napi:
    name: Build N-API
    needs: validate
    uses: ./.github/workflows/build-napi.yml
    with:
      ref: ${{ github.sha }}

  build-python:
    name: Build Python
    needs: validate
    uses: ./.github/workflows/build-python.yml
    with:
      ref: ${{ github.sha }}

  # ============================================================================
  # STAGE 4: PUBLISH BINDINGS & CREATE RELEASES
  # ============================================================================
  # This job only runs when dry_run is false.  It publishes all binding
  # artifacts to their respective registries, pushes git tags, and
  # creates GitHub Releases.
  # ============================================================================
  publish-bindings:
    name: Publish bindings to registries
    needs:
      - publish-gl-sdk-cli
      - build-swift
      - build-kotlin
      - build-napi
      - build-python
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run == false }}
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      # -- npm -----------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: libs/gl-sdk-napi
        run: |
          npm ci
          find ../../artifacts/napi-* -name "*.node" -exec cp {} . \;
          ls -la *.node index.js index.d.ts 2>/dev/null || true
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # -- PyPI ----------------------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Publish to PyPI
        run: |
          mkdir -p pypi-dist
          find artifacts/python-* -name "*.whl" -o -name "*.tar.gz" | xargs -I{} cp {} pypi-dist/
          ls pypi-dist/
          uv publish pypi-dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      # -- Swift ---------------------------------------------------------
      - name: Checkout gl-sdk-swift repo
        uses: actions/checkout@v6
        with:
          repository: Blockstream/gl-sdk-swift
          token: ${{ secrets.SWIFT_RELEASE_TOKEN }}
          path: swift-repo

      - name: Render Swift package manifests and copy sources
        env:
          VERSION: gl-sdk-v${{ inputs.gl_sdk_version }}
          XCF_CHECKSUM: ${{ needs.build-swift.outputs.xcframework_checksum }}
        run: |
          cp artifacts/swift-generated-source/glsdk.swift \
             swift-repo/Sources/GreenlightSDK/GreenlightSDK.swift

          VARS='$VERSION:$XCF_CHECKSUM'
          envsubst "$VARS" < swift-repo/templates/Package.swift      > swift-repo/Package.swift
          envsubst "$VARS" < swift-repo/templates/glsdkFFI.podspec   > swift-repo/glsdkFFI.podspec
          envsubst "$VARS" < swift-repo/templates/GreenlightSDK.podspec > swift-repo/GreenlightSDK.podspec

      - name: Commit, tag, and push to gl-sdk-swift
        working-directory: swift-repo
        env:
          VERSION: gl-sdk-v${{ inputs.gl_sdk_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/ glsdkFFI.podspec GreenlightSDK.podspec
          git commit -m "Bump Greenlight SDK to version $VERSION"
          git tag "$VERSION" -m "$VERSION"
          git push origin main
          git push origin "$VERSION"

      - name: Create Swift GitHub Release with XCFramework
        uses: softprops/action-gh-release@v3
        with:
          repository: Blockstream/gl-sdk-swift
          token: ${{ secrets.SWIFT_RELEASE_TOKEN }}
          tag_name: gl-sdk-v${{ inputs.gl_sdk_version }}
          name: gl-sdk-v${{ inputs.gl_sdk_version }}
          files: artifacts/swift-xcframework/glsdkFFI.xcframework.zip
          prerelease: false

      # -- Git tags & GitHub Releases ------------------------------------
      - name: Create git tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "gl-client-v${{ inputs.gl_client_version }}" -m "gl-client v${{ inputs.gl_client_version }}"
          git tag "gl-sdk-v${{ inputs.gl_sdk_version }}"       -m "gl-sdk v${{ inputs.gl_sdk_version }}"
          git tag "gl-sdk-cli-v${{ inputs.gl_sdk_cli_version }}" -m "gl-sdk-cli v${{ inputs.gl_sdk_cli_version }}"
          git push origin \
            "gl-client-v${{ inputs.gl_client_version }}" \
            "gl-sdk-v${{ inputs.gl_sdk_version }}" \
            "gl-sdk-cli-v${{ inputs.gl_sdk_cli_version }}"

      - name: Create GitHub Release for gl-client
        uses: softprops/action-gh-release@v3
        with:
          tag_name: gl-client-v${{ inputs.gl_client_version }}
          name: gl-client v${{ inputs.gl_client_version }}
          body: |
            Published gl-client v${{ inputs.gl_client_version }} to [crates.io](https://crates.io/crates/gl-client/${{ inputs.gl_client_version }}).

      - name: Create GitHub Release for gl-sdk
        uses: softprops/action-gh-release@v3
        with:
          tag_name: gl-sdk-v${{ inputs.gl_sdk_version }}
          name: gl-sdk v${{ inputs.gl_sdk_version }}
          body: |
            Published gl-sdk v${{ inputs.gl_sdk_version }} to [crates.io](https://crates.io/crates/gl-sdk/${{ inputs.gl_sdk_version }}).

            Bindings published:
            - Swift: [gl-sdk-swift gl-sdk-v${{ inputs.gl_sdk_version }}](https://github.com/Blockstream/gl-sdk-swift/releases/tag/gl-sdk-v${{ inputs.gl_sdk_version }})
            - npm: [@greenlightcln/glsdk](https://www.npmjs.com/package/@greenlightcln/glsdk)
            - PyPI: [gl-client](https://pypi.org/project/gl-client/)

      - name: Create GitHub Release for gl-sdk-cli
        uses: softprops/action-gh-release@v3
        with:
          tag_name: gl-sdk-cli-v${{ inputs.gl_sdk_cli_version }}
          name: gl-sdk-cli v${{ inputs.gl_sdk_cli_version }}
          body: |
            Published gl-sdk-cli v${{ inputs.gl_sdk_cli_version }} to [crates.io](https://crates.io/crates/gl-sdk-cli/${{ inputs.gl_sdk_cli_version }}).

  # ============================================================================
  # DRY-RUN: test npm publish
  # ============================================================================
  dry-run-npm:
    name: Dry-run npm publish
    needs:
      - build-napi
      - publish-gl-sdk-cli
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run == true }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download N-API artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Dry-run npm publish
        working-directory: libs/gl-sdk-napi
        run: |
          npm ci
          find ../../artifacts/napi-* -name "*.node" -exec cp {} . \;
          ls -la *.node index.js index.d.ts 2>/dev/null || true
          echo "=== DRY RUN: npm publish --dry-run ==="
          npm publish --access public --dry-run

  # ============================================================================
  # DRY-RUN SUMMARY
  # ============================================================================
  dry-run-summary:
    name: Dry-run summary
    needs:
      - validate
      - publish-gl-sdk-cli
      - build-swift
      - build-kotlin
      - build-napi
      - build-python
      - dry-run-npm
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run == true }}
    steps:
      - name: Summary
        run: |
          echo "============================================="
          echo "  DRY RUN COMPLETE"
          echo "============================================="
          echo ""
          echo "All validation checks passed."
          echo "All binding builds completed successfully."
          echo "Cargo dry-run publishes passed."
          echo "npm dry-run publish passed."
          echo ""
          echo "Versions validated:"
          echo "  gl-client:  ${{ inputs.gl_client_version }}"
          echo "  gl-sdk:     ${{ inputs.gl_sdk_version }}"
          echo "  gl-sdk-cli: ${{ inputs.gl_sdk_cli_version }}"
          echo ""
          echo "To publish for real, re-run with dry_run=false."
