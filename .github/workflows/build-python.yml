name: Build Python Wheels

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out and build'
        required: true
        type: string

jobs:
  source:
    name: Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build source distribution
        run: uv build --package gl-client --sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/gl_client-*.tar.gz
          retention-days: 7

  wheels:
    name: Wheels - ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            os: linux
            target: x86_64

          - host: ubuntu-latest
            os: linux
            target: i686

          - host: macos-latest
            os: macos
            target: x86_64

          - host: macos-latest
            os: macos
            target: aarch64

          - host: windows-latest
            os: windows
            target: x64

          - host: windows-latest
            os: windows
            target: x86

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.2'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: libs/gl-client-py
          rust-toolchain: stable
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist
          # Mount host protoc into maturin's Docker container (Linux only)
          docker-options: >-
            -v /opt/hostedtoolcache/protoc/v23.2/x64/bin/protoc:/usr/bin/protoc:ro

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}-${{ matrix.target }}
          path: libs/gl-client-py/dist/
          retention-days: 7
